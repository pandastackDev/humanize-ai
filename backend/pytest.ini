[pytest]
# Pytest configuration for humanize backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not slow"
    
# Coverage options (optional)
# addopts = -v --cov=src --cov-report=html --cov-report=term

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may call actual API)
    slow: Slow tests (e.g., full detector pass-rate)
    external: Tests that call external APIs
    
# Async support
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 300

# Ignore paths
norecursedirs = .git .tox dist build *.egg __pycache__







